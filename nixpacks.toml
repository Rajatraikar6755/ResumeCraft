[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npx prisma generate --schema=server/prisma/schema.prisma", "npx esbuild server/index.ts --bundle --platform=node --format=esm --outfile=dist/index.js --packages=external", "ls -la dist/"]

[start]
cmd = "node dist/index.js"
